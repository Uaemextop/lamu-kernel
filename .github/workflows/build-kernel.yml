name: Build Kernel with KernelSU Next

on:
  workflow_dispatch:
    inputs:
      SUSFS:
        description: "Enable SUSFS (hide KernelSU from detection)"
        required: true
        type: choice
        options:
          - 'On'
          - 'Off'
        default: 'On'

      bbg:
        description: "Enable BBG (Baseband Guard protection)"
        required: true
        type: choice
        options:
          - 'On'
          - 'Off'
        default: 'On'

      bbr:
        description: "Enable BBR network congestion algorithm"
        required: true
        type: choice
        options:
          - 'On'
          - 'Off'
        default: 'Off'

      proxy:
        description: "Enable proxy performance optimization (disable for MTK chips)"
        required: true
        type: choice
        options:
          - 'On'
          - 'Off'
        default: 'Off'

      UNICODE_BYPASS:
        description: "Enable Unicode zero-width bypass fix"
        required: true
        type: choice
        options:
          - 'On'
          - 'Off'
        default: 'Off'

jobs:
  build:
    name: Lamu KernelSU Next (SUSFS ${{ github.event.inputs.SUSFS }})
    runs-on: aapt2

    permissions:
      contents: write

    env:
      TARGET_PRODUCT: lamu
      KERNEL_DEFCONFIG: mgk_64_k66_defconfig
      KERNEL_BUILD_VARIANT: user
      KERNEL_TARGET_ARCH: arm64
      KERNEL_DIR: kernel/kernel_device_modules-6.6
      LINUX_KERNEL_VERSION: kernel-6.6
      ANDROID_VERSION: android15
      KERNEL_VERSION: '6.6'
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CCACHE_MAXSIZE: 8G

    steps:
      - name: "🚀 Checkout repository"
        uses: actions/checkout@v4

      - name: "🔐 Configure Git"
        run: |
          git config --global user.name "build"
          git config --global user.email "build@lamu-kernel"

      - name: "📦 Install dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3
          sudo apt-get install -y \
            bc bison build-essential flex libelf-dev libssl-dev \
            libncurses-dev python3 git curl wget rsync cpio zip unzip \
            ccache gawk dos2unix git curl ca-certificates build-essential clang lld flex bison \
            libelf-dev libssl-dev libncurses-dev zlib1g-dev liblz4-tool \
            libxml2-utils rsync unzip dwarves file python3 ccache

      
      - name: Install Repo Tool
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo
          
      - name: "⬇️ Clone external dependencies"
        run: |
          my_top_dir=$PWD/kernel_platform

          mkdir -vp $my_top_dir

          cd $my_top_dir/

          mkdir -vp $my_top_dir/external

          cd $my_top_dir/external

          git clone --depth 1 https://android.googlesource.com/platform/external/libcap -b android15-release

          git clone --depth 1 https://android.googlesource.com/platform/external/libcap-ng -b android15-release

          git clone --depth 1 https://android.googlesource.com/platform/external/bazel-skylib -b android15-release

          git clone --depth 1 https://android.googlesource.com/platform/external/bazelbuild-rules_cc -b android15-release

          git clone --depth 1 https://android.googlesource.com/platform/external/bazelbuild-rules_license -b android15-release

          git clone --depth 1 https://android.googlesource.com/platform/external/bazelbuild-rules_pkg -b main-kernel

          git clone --depth 1 https://android.googlesource.com/platform/external/bazelbuild-rules_python -b android15-release

          git clone --depth 1 https://android.googlesource.com/platform/external/bazelbuild-rules_rust -b android15-release

          git clone --depth 1 https://android.googlesource.com/platform/external/stardoc -b android15-release

          git clone --depth 1 https://android.googlesource.com/platform/external/zopfli -b android15-release

          git clone --depth 1 https://android.googlesource.com/platform/external/pigz -b main-kernel

          mkdir -vp $my_top_dir/prebuilts/bazel/linux-x86_64

          git clone --depth 1 https://android.googlesource.com/platform/prebuilts/bazel/linux-x86_64 -b android15-release $my_top_dir/prebuilts/bazel/linux-x86_64

          mkdir -vp $my_top_dir/external/python/absl-py

          git clone --depth 1 https://android.googlesource.com/platform/external/python/absl-py -b android15-release $my_top_dir/external/python/absl-py

      - name: "⬇️ Clone prebuilts - Clang and GCC"
        run: |
          my_top_dir=$PWD/kernel_platform

          mkdir -vp $my_top_dir/prebuilts/clang/host

          cd $my_top_dir/prebuilts/clang/host

          git clone --depth 1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b android15-release

          mkdir -vp $my_top_dir/prebuilts/gcc/linux-x86/host

          cd $my_top_dir/prebuilts/gcc/linux-x86/host

          git clone --depth 1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/host/x86_64-linux-glibc2.17-4.8 -b android15-release

      - name: "⬇️ Clone prebuilts - build-tools, jdk, rust, clang-tools"
        run: |
          my_top_dir=$PWD/kernel_platform

          cd $my_top_dir/prebuilts

          git clone --depth 1 https://android.googlesource.com/platform/prebuilts/build-tools -b android15-release

          mkdir -vp $my_top_dir/prebuilts/jdk

          git clone --depth 1 https://android.googlesource.com/platform/prebuilts/jdk/jdk11 -b build-tools-release $my_top_dir/prebuilts/jdk/jdk11

          git clone --depth 1 https://android.googlesource.com/platform/prebuilts/rust -b android15-release

          git clone --depth 1 https://android.googlesource.com/platform/prebuilts/clang-tools -b android15-release

      - name: "⬇️ Clone build rules and system tools"
        run: |
          my_top_dir=$PWD/kernel_platform

          mkdir -vp $my_top_dir/build/

          git clone --depth 1 https://android.googlesource.com/platform/build/bazel_common_rules -b android15-release $my_top_dir/build/bazel_common_rules

          mkdir -vp $my_top_dir/system/tools/

          cd $my_top_dir/system/tools/

          git clone --depth 1 https://android.googlesource.com/platform/system/tools/mkbootimg -b android15-release

      - name: "⬇️ Clone prebuilts - NDK"
        run: |
          my_top_dir=$PWD/kernel_platform

          git clone --depth 1 https://android.googlesource.com/toolchain/prebuilts/ndk/r26 -b main-kernel-2025 $my_top_dir/prebuilts/ndk-r26
          git clone --depth 1 https://android.googlesource.com/toolchain/prebuilts/ndk/r23 -b main-kernel-build-2023 $my_top_dir/prebuilts/ndk-r23

      - name: "⬇️ Clone kernel source code"
        run: |
          my_top_dir=$PWD/kernel_platform

          cd $my_top_dir

          # kernel-mtk (GKI source) goes into kernel/kernel-6.6/ (Bazel package //kernel-6.6)
          mkdir -p kernel
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/kernel-mtk.git -b android-15-release-vvta35 kernel/kernel-6.6
          # Build system goes into kernel/build/ (workspace-level)
          mkdir -p kernel/build
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/kernel-build-kernel.git -b android-15-release-vvta35 kernel/build/kernel
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/kernel-build-bazel_mgk_rules.git -b android-15-release-vvta35 kernel/build/bazel_mgk_rules
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/kernel-prebuilts-kernel-build-tools.git -b android-15-release-vvta35 prebuilts/kernel-build-tools
          # Device modules go into kernel/kernel_device_modules-6.6/ (Bazel package //kernel_device_modules-6.6)
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/kernel-kernel_device_modules-6.6.git -b android-15-release-vvta35 kernel/kernel_device_modules-6.6
          # Vendor modules
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/vendor-mediatek-kernel_modules-connectivity-wlan-core-gen4m.git -b android-15-release-vvta35 vendor/mediatek/kernel_modules/connectivity/wlan/core/gen4m
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/vendor-mediatek-kernel_modules-connectivity-bt-mt66xx.git -b android-15-release-vvta35 vendor/mediatek/kernel_modules/connectivity/bt/mt66xx
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/vendor-mediatek-kernel_modules-connectivity-bt-mt76xx-sdio.git -b android-15-release-vvta35 vendor/mediatek/kernel_modules/connectivity/bt/mt76xx-sdio
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/vendor-mediatek-kernel_modules-connectivity-common.git -b android-15-release-vvta35 vendor/mediatek/kernel_modules/connectivity/common
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/vendor-mediatek-kernel_modules-connectivity-connfem.git -b android-15-release-vvta35 vendor/mediatek/kernel_modules/connectivity/connfem
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/vendor-mediatek-kernel_modules-connectivity-conninfra.git -b android-15-release-vvta35 vendor/mediatek/kernel_modules/connectivity/conninfra
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/vendor-mediatek-kernel_modules-connectivity-fmradio.git -b android-15-release-vvta35 vendor/mediatek/kernel_modules/connectivity/fmradio
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/vendor-mediatek-kernel_modules-connectivity-gps.git -b android-15-release-vvta35 vendor/mediatek/kernel_modules/connectivity/gps
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/vendor-mediatek-kernel_modules-connectivity-wlan-adaptor.git -b android-15-release-vvta35 vendor/mediatek/kernel_modules/connectivity/wlan/adaptor
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/vendor-mediatek-kernel_modules-gpu.git -b android-15-release-vvta35 vendor/mediatek/kernel_modules/gpu
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/vendor-mediatek-kernel_modules-met_drv_v3.git -b android-15-release-vvta35 vendor/mediatek/kernel_modules/met_drv_v3
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/vendor-mediatek-kernel_modules-met_drv_v2.git -b android-15-release-vvta35 vendor/mediatek/kernel_modules/met_drv_v2
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/vendor-mediatek-kernel_modules-udc.git -b android-15-release-vvta35 vendor/mediatek/kernel_modules/udc
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/vendor-mediatek-kernel_modules-connectivity-bt-linux_v2.git -b android-15-release-vvta35 vendor/mediatek/kernel_modules/connectivity/bt/linux_v2
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/vendor-mediatek-kernel_modules-mtkcam.git -b android-15-release-vvta35 vendor/mediatek/kernel_modules/mtkcam
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/vendor-mediatek-kernel_modules-afs_common_utils.git -b android-15-release-vvta35 vendor/mediatek/kernel_modules/afs_common_utils

      - name: "🔗 Create workspace symlinks"
        run: |
          my_top_dir=$PWD/kernel_platform

          cd $my_top_dir/kernel

          # Link external dependencies into workspace
          ln -sf ../external external

          # Link prebuilts into workspace
          ln -sf ../prebuilts prebuilts

          # Link system tools into workspace
          ln -sf ../system system

          # Link vendor modules into workspace
          ln -sf ../vendor vendor

          # Link build/bazel_common_rules (build/ dir already has build/kernel and build/bazel_mgk_rules)
          ln -sf ../../build/bazel_common_rules build/bazel_common_rules

          echo "✅ Workspace symlinks created"
          ls -la external prebuilts system vendor build/bazel_common_rules

      - name: "🔍 Detect kernel source directory"
        run: |
          cd kernel_platform

          # GKI source is at kernel/kernel-6.6 (kernel-mtk cloned into workspace/kernel-6.6)
          GKI_KERNEL_SRC="kernel/${LINUX_KERNEL_VERSION}"
          if [ ! -f "${GKI_KERNEL_SRC}/drivers/Kconfig" ]; then
            echo "❌ ERROR: Could not find kernel source at ${GKI_KERNEL_SRC}"
            ls -la kernel/
            exit 1
          fi

          echo "✅ Found GKI kernel source at: kernel_platform/${GKI_KERNEL_SRC}"
          echo "GKI_KERNEL_SRC=${GKI_KERNEL_SRC}" >> $GITHUB_ENV

          # Find the GKI defconfig
          GKI_DEFCONFIG="${GKI_KERNEL_SRC}/arch/arm64/configs/gki_defconfig"
          if [ ! -f "$GKI_DEFCONFIG" ]; then
            echo "⚠️ gki_defconfig not found at ${GKI_DEFCONFIG}, searching..."
            GKI_DEFCONFIG=$(find "${GKI_KERNEL_SRC}" -name "gki_defconfig" -path "*/arm64/configs/*" | head -1)
          fi

          if [ -z "$GKI_DEFCONFIG" ] || [ ! -f "$GKI_DEFCONFIG" ]; then
            echo "⚠️ gki_defconfig not found, will search again before config step"
          else
            echo "✅ Found GKI defconfig at: ${GKI_DEFCONFIG}"
          fi
          echo "GKI_DEFCONFIG=${GKI_DEFCONFIG}" >> $GITHUB_ENV

      - name: "🔧 Setup version strings"
        run: |
          cd kernel_platform/${GKI_KERNEL_SRC}

          # Remove protected exports
          rm -f android/abi_gki_protected_exports_* || true

          # Remove -dirty from version strings
          if [ -f scripts/setlocalversion ]; then
            sed -i 's/ -dirty//g' scripts/setlocalversion
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' scripts/setlocalversion
          fi

          # Customize version suffix for 6.6 kernel
          if [ -f arch/arm64/configs/gki_defconfig ]; then
            ESCAPED_SUFFIX=$(printf '%s\n' "-${ANDROID_VERSION}-lamu-ksu" | sed 's:[\/&]:\\&:g')
            sed -i "s/-4k/$ESCAPED_SUFFIX/g" arch/arm64/configs/gki_defconfig || true
          fi

          if [ -f scripts/setlocalversion ]; then
            sed -i 's/${scm_version}//' scripts/setlocalversion || true
          fi

          echo "✅ Version strings configured"

      - name: "⚡ Setup Baseband-guard"
        if: ${{ github.event.inputs.bbg == 'On' }}
        run: |
          cd kernel_platform/${GKI_KERNEL_SRC}
          echo "🛠️ Setting up Baseband-guard..."
          curl -sSL https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh -o setup_bbg.sh
          bash setup_bbg.sh
          echo "✅ Baseband-guard configured"

      - name: "⚡ Setup KernelSU Next"
        run: |
          cd kernel_platform/${GKI_KERNEL_SRC}

          echo "🛠️ Setting up KernelSU Next..."
          curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/dev-susfs/kernel/setup.sh" | bash -s dev-susfs

          cd KernelSU-Next
          COMMIT_COUNT=$(curl -sI "https://api.github.com/repos/KernelSU-Next/KernelSU-Next/commits?sha=dev&per_page=1" \
            | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p')
          if [ -z "$COMMIT_COUNT" ] || ! [ "$COMMIT_COUNT" -eq "$COMMIT_COUNT" ] 2>/dev/null; then
            echo "⚠️ Could not fetch commit count from GitHub API, using fallback version"
            KSU_VERSION=31000
          else
            KSU_VERSION=$(expr "$COMMIT_COUNT" "+" 30000)
          fi
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          sed -i "s/DKSU_VERSION=11998/DKSU_VERSION=${KSU_VERSION}/" kernel/Makefile

          echo "✅ KernelSU Next configured (version: $KSU_VERSION)"

      - name: "🔧 Setup and apply patches"
        run: |
          KP_DIR="$GITHUB_WORKSPACE/kernel_platform"
          cd "$KP_DIR"

          echo "⬇️ Downloading patches..."
          if [ "${{ github.event.inputs.SUSFS }}" == "On" ]; then
            git clone https://github.com/cctv18/susfs4oki.git \
              -b "oki-${ANDROID_VERSION}-${KERNEL_VERSION}"
          fi
          git clone https://github.com/Xiaomichael/kernel_patches.git
          git clone https://github.com/ShirkNeko/SukiSU_patch.git

          KSRC="${KP_DIR}/${GKI_KERNEL_SRC}"

          echo "📝 Copying patch files..."
          if [ "${{ github.event.inputs.SUSFS }}" == "On" ]; then
            cp "${KP_DIR}/susfs4oki/kernel_patches/50_add_susfs_in_gki-${ANDROID_VERSION}-${KERNEL_VERSION}.patch" "${KSRC}/"
            cp "${KP_DIR}/susfs4oki/kernel_patches/fs/"* "${KSRC}/fs/" || true
            cp "${KP_DIR}/susfs4oki/kernel_patches/include/linux/"* "${KSRC}/include/linux/" || true
          else
            cp "${KP_DIR}/kernel_patches/next/scope_min_manual_hooks_v1.6.patch" "${KSRC}/"
          fi

          if [ "${{ github.event.inputs.UNICODE_BYPASS }}" = "On" ]; then
            cp "${KP_DIR}/kernel_patches/common/unicode_bypass_fix_6.1+.patch" "${KSRC}/unicode_bypass_fix.patch"
          fi

          echo "🔧 Applying patches..."
          cd "${KSRC}"

          if [ "${{ github.event.inputs.UNICODE_BYPASS }}" = "On" ]; then
            echo "📦 Applying Unicode zero-width bypass fix..."
            if ! patch -p1 < unicode_bypass_fix.patch; then
              echo "⚠️ Unicode bypass patch had failures (some hunks may not apply on this kernel version)"
            fi
          fi

          if [ "${{ github.event.inputs.SUSFS }}" == "On" ]; then
            echo "📦 Applying SUSFS patch..."
            if ! patch -p1 < "50_add_susfs_in_gki-${ANDROID_VERSION}-${KERNEL_VERSION}.patch"; then
              echo "⚠️ SUSFS patch had failures (some hunks may not apply on this kernel version)"
            fi
            cp "${KP_DIR}/kernel_patches/69_hide_stuff.patch" ./
            if ! patch -p1 -F 3 < 69_hide_stuff.patch; then
              echo "⚠️ hide_stuff patch had failures (some hunks may not apply)"
            fi
          else
            echo "📦 Applying manual hook patch..."
            if ! patch -p1 --fuzz=3 < scope_min_manual_hooks_v1.6.patch; then
              echo "⚠️ Manual hook patch had failures (some hunks may not apply)"
            fi
          fi

          echo "✅ All patches applied"

      - name: "⚙️ Configure kernel options"
        run: |
          KP_DIR="$GITHUB_WORKSPACE/kernel_platform"
          cd "$KP_DIR"

          # Determine defconfig path
          DEFCONFIG="${GKI_DEFCONFIG}"
          if [ -z "$DEFCONFIG" ] || [ ! -f "$DEFCONFIG" ]; then
            DEFCONFIG="${GKI_KERNEL_SRC}/arch/arm64/configs/gki_defconfig"
          fi
          if [ ! -f "$DEFCONFIG" ]; then
            DEFCONFIG=$(find . -name "gki_defconfig" -path "*/arm64/configs/*" | head -1)
          fi

          if [ -z "$DEFCONFIG" ] || [ ! -f "$DEFCONFIG" ]; then
            echo "❌ ERROR: Could not find gki_defconfig"
            exit 1
          fi

          echo "⚙️ Modifying defconfig: $DEFCONFIG"

          # Enable KSU support
          echo "CONFIG_KSU=y" >> "${DEFCONFIG}"

          # SUSFS configuration
          if [ "${{ github.event.inputs.SUSFS }}" == "On" ]; then
            echo "📦 Enabling SUSFS..."
            echo "CONFIG_KSU_SUSFS=y" >> "${DEFCONFIG}"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> "${DEFCONFIG}"
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> "${DEFCONFIG}"
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> "${DEFCONFIG}"
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> "${DEFCONFIG}"
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> "${DEFCONFIG}"
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> "${DEFCONFIG}"
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> "${DEFCONFIG}"
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> "${DEFCONFIG}"
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> "${DEFCONFIG}"
          else
            echo "📦 Enabling manual hook..."
            echo "CONFIG_KSU_SUSFS=n" >> "${DEFCONFIG}"
            echo "CONFIG_KSU_MANUAL_HOOK=y" >> "${DEFCONFIG}"
          fi

          # Mountify support
          echo "CONFIG_TMPFS_XATTR=y" >> "${DEFCONFIG}"
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> "${DEFCONFIG}"

          # Baseband Guard
          if [ "${{ github.event.inputs.bbg }}" == "On" ]; then
            echo "⚡ Enabling BBG..."
            echo "CONFIG_BBG=y" >> "${DEFCONFIG}"
            echo 'CONFIG_LSM="landlock,lockdown,yama,loadpin,safesetid,integrity,selinux,smack,tomoyo,apparmor,bpf,baseband_guard"' >> "${DEFCONFIG}"
          fi

          # BBR network algorithm
          if [ "${{ github.event.inputs.bbr }}" == "On" ]; then
            echo "🌐 Enabling BBR..."
            echo "CONFIG_TCP_CONG_ADVANCED=y" >> "${DEFCONFIG}"
            echo "CONFIG_TCP_CONG_BBR=y" >> "${DEFCONFIG}"
            echo "CONFIG_NET_SCH_FQ=y" >> "${DEFCONFIG}"
            echo "CONFIG_TCP_CONG_BIC=n" >> "${DEFCONFIG}"
            echo "CONFIG_TCP_CONG_WESTWOOD=n" >> "${DEFCONFIG}"
            echo "CONFIG_TCP_CONG_HTCP=n" >> "${DEFCONFIG}"
          fi

          # Proxy performance optimization
          if [ "${{ github.event.inputs.proxy }}" == "On" ]; then
            echo "🔧 Enabling proxy optimization..."
            echo "CONFIG_BPF_STREAM_PARSER=y" >> "${DEFCONFIG}"
            echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y" >> "${DEFCONFIG}"
            echo "CONFIG_NETFILTER_XT_SET=y" >> "${DEFCONFIG}"
            echo "CONFIG_IP_SET=y" >> "${DEFCONFIG}"
            echo "CONFIG_IP_SET_MAX=65534" >> "${DEFCONFIG}"
            echo "CONFIG_IP_SET_BITMAP_IP=y" >> "${DEFCONFIG}"
            echo "CONFIG_IP_SET_BITMAP_IPMAC=y" >> "${DEFCONFIG}"
            echo "CONFIG_IP_SET_BITMAP_PORT=y" >> "${DEFCONFIG}"
            echo "CONFIG_IP_SET_HASH_IP=y" >> "${DEFCONFIG}"
            echo "CONFIG_IP_SET_HASH_IPMARK=y" >> "${DEFCONFIG}"
            echo "CONFIG_IP_SET_HASH_IPPORT=y" >> "${DEFCONFIG}"
            echo "CONFIG_IP_SET_HASH_IPPORTIP=y" >> "${DEFCONFIG}"
            echo "CONFIG_IP_SET_HASH_IPPORTNET=y" >> "${DEFCONFIG}"
            echo "CONFIG_IP_SET_HASH_IPMAC=y" >> "${DEFCONFIG}"
            echo "CONFIG_IP_SET_HASH_MAC=y" >> "${DEFCONFIG}"
            echo "CONFIG_IP_SET_HASH_NETPORTNET=y" >> "${DEFCONFIG}"
            echo "CONFIG_IP_SET_HASH_NET=y" >> "${DEFCONFIG}"
            echo "CONFIG_IP_SET_HASH_NETNET=y" >> "${DEFCONFIG}"
            echo "CONFIG_IP_SET_HASH_NETPORT=y" >> "${DEFCONFIG}"
            echo "CONFIG_IP_SET_HASH_NETIFACE=y" >> "${DEFCONFIG}"
            echo "CONFIG_IP_SET_LIST_SET=y" >> "${DEFCONFIG}"
            echo "CONFIG_IP6_NF_NAT=y" >> "${DEFCONFIG}"
            echo "CONFIG_IP6_NF_TARGET_MASQUERADE=y" >> "${DEFCONFIG}"
          fi

          # O2 optimization for 6.6
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> "${DEFCONFIG}"

          # Skip unnecessary header install
          echo "CONFIG_HEADERS_INSTALL=n" >> "${DEFCONFIG}"

          # Disable defconfig check
          if [ -f "${GKI_KERNEL_SRC}/build.config.gki" ]; then
            sed -i 's/check_defconfig//' "${GKI_KERNEL_SRC}/build.config.gki"
          fi

          echo "✅ Kernel options configured"

      - name: "🔨 Build kernel with Bazel"
        run: |
          my_top_dir=$PWD/kernel_platform

          cd $my_top_dir

          KERNEL_ROOT_DIR=$PWD
          KERNEL_BAZEL_BUILD_OUT=out/target/product/${TARGET_PRODUCT}/obj/KLEAF_OBJ
          KERNEL_BAZEL_DIST_OUT=out/target/product/${TARGET_PRODUCT}/obj/KLEAF_OBJ/dist

          export BAZEL_DO_NOT_DETECT_CPP_TOOLCHAIN=1
          export DEFCONFIG_OVERLAYS="mt6768_overlay.config lamu_overlay.config"
          export KERNEL_VERSION=kernel-6.6
          export SOURCE_DATE_EPOCH=0
          export JAVA_HOME=${KERNEL_ROOT_DIR}/prebuilts/jdk/jdk11/linux-x86
          export PATH="${KERNEL_ROOT_DIR}/prebuilts/jdk/jdk11/linux-x86/bin:${PATH}"

          PRIVATE_BAZEL_BUILD_FLAG="--//build/bazel_mgk_rules:kernel_version=${LINUX_KERNEL_VERSION#kernel-} --experimental_writable_outputs --noenable_bzlmod --config=stamp --repo_manifest=${KERNEL_ROOT_DIR}/${KERNEL_DIR}/fake_manifest.xml"

          my_kernel_target=${KERNEL_DEFCONFIG%_defconfig}

          PRIVATE_BAZEL_BUILD_GOAL="//${KERNEL_DIR#kernel/}:${my_kernel_target}_customer_modules_install.${KERNEL_BUILD_VARIANT}"

          PRIVATE_BAZEL_DIST_GOAL="//${KERNEL_DIR#kernel/}:${my_kernel_target}_customer_dist.${KERNEL_BUILD_VARIANT}"

          cd ${KERNEL_ROOT_DIR}/kernel

          # Setup WORKSPACE file required by Bazel (MGK-specific, defines @mgk_info and vendor repos)
          cp build/bazel_mgk_rules/kleaf/bazel.WORKSPACE WORKSPACE

          # Use git-cloned build/kernel/kleaf/bazel.py directly (no symlinks)
          # The build repo was already cloned via git clone in an earlier step
          KLEAF_REPO_DIR=$(build/kernel/gettop.sh) || { echo "❌ Failed to determine repo root via gettop.sh"; exit 1; }
          echo "✅ Workspace root: $KLEAF_REPO_DIR"
          export PYTHONPATH="$(pwd)/build/kernel/kleaf:${PYTHONPATH:-}"

          python3 build/kernel/kleaf/bazel.py "$KLEAF_REPO_DIR" \
            --output_root=${KERNEL_ROOT_DIR}/${KERNEL_BAZEL_BUILD_OUT} \
            --output_base=${KERNEL_ROOT_DIR}/${KERNEL_BAZEL_BUILD_OUT}/bazel/output_user_root/output_base \
            build ${PRIVATE_BAZEL_BUILD_FLAG} ${PRIVATE_BAZEL_BUILD_GOAL}

          python3 build/kernel/kleaf/bazel.py "$KLEAF_REPO_DIR" \
            --output_root=${KERNEL_ROOT_DIR}/${KERNEL_BAZEL_BUILD_OUT} \
            --output_base=${KERNEL_ROOT_DIR}/${KERNEL_BAZEL_BUILD_OUT}/bazel/output_user_root/output_base \
            run ${PRIVATE_BAZEL_BUILD_FLAG} --nokmi_symbol_list_violations_check ${PRIVATE_BAZEL_DIST_GOAL} \
            -- --dist_dir=${KERNEL_ROOT_DIR}/${KERNEL_BAZEL_DIST_OUT}

          python3 build/kernel/kleaf/bazel.py "$KLEAF_REPO_DIR" \
            --output_root=${KERNEL_ROOT_DIR}/${KERNEL_BAZEL_BUILD_OUT} \
            --output_base=${KERNEL_ROOT_DIR}/${KERNEL_BAZEL_BUILD_OUT}/bazel/output_user_root/output_base \
            run ${PRIVATE_BAZEL_BUILD_FLAG} \
            //${LINUX_KERNEL_VERSION}:kernel_aarch64_abi_dist \
            -- --dist_dir=${KERNEL_ROOT_DIR}/${KERNEL_BAZEL_DIST_OUT}/abi

          echo "✅ Kernel build complete"

      - name: "📦 Package AnyKernel3"
        if: success()
        run: |
          echo "📦 Preparing AnyKernel3 package..."
          mkdir -p kernel_platform/out/Final-Image-Find/

          image_path=$(find kernel_platform/ -name "Image" -type f | head -n 1)
          if [ -n "$image_path" ] && [ -f "$image_path" ]; then
            echo "✅ Found Image at: $image_path"
            cp "$image_path" AnyKernel3/Image
            cp "$image_path" kernel_platform/out/Final-Image-Find/Image
          else
            echo "Image not found in build output, checking dist directory..."
            if [ -f "kernel_platform/out/target/product/lamu/obj/KLEAF_OBJ/dist/Image" ]; then
              cp kernel_platform/out/target/product/lamu/obj/KLEAF_OBJ/dist/Image AnyKernel3/Image
              cp kernel_platform/out/target/product/lamu/obj/KLEAF_OBJ/dist/Image kernel_platform/out/Final-Image-Find/Image
            fi
          fi

          cd AnyKernel3
          zip -r9 "$GITHUB_WORKSPACE/AnyKernel3-lamu.zip" ./* -x '*.git*'

      - name: "🧠 Set artifact name"
        id: set_name
        run: |
          BASE_NAME="lamu_KernelSU_Next_${{ env.KSUVER }}"

          if [ "${{ github.event.inputs.SUSFS }}" = "On" ]; then
            FINAL_NAME="${BASE_NAME}_SUSFS"
          else
            FINAL_NAME="${BASE_NAME}"
          fi

          echo "ARTIFACT_NAME=${FINAL_NAME}" >> $GITHUB_OUTPUT

      - name: "📦 Package build output"
        if: success()
        run: |
          cd kernel_platform/out/target/product/lamu/obj/KLEAF_OBJ/dist
          zip -r $GITHUB_WORKSPACE/kernel-lamu-build.zip .

      - name: "📤 Upload AnyKernel3 artifact"
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set_name.outputs.ARTIFACT_NAME }}
          path: ./AnyKernel3/*

      - name: "📤 Upload build artifacts"
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build-output
          path: kernel_platform/out/target/product/lamu/obj/KLEAF_OBJ/dist/
          retention-days: 14

      - name: "📤 Upload AnyKernel3 zip to repository"
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp "$GITHUB_WORKSPACE/AnyKernel3-lamu.zip" "$GITHUB_WORKSPACE/${{ steps.set_name.outputs.ARTIFACT_NAME }}.zip"
          git add -f "${{ steps.set_name.outputs.ARTIFACT_NAME }}.zip"
          git commit -m "Add AnyKernel3 zip: ${{ steps.set_name.outputs.ARTIFACT_NAME }}" || echo "⚠️ Nothing to commit"
          git push || echo "⚠️ Failed to push zip to repository (zip will still be available in release)"

      - name: "🚀 Create GitHub Release"
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kernel-lamu-ksu-${{ github.run_number }}
          name: "Lamu KernelSU Next #${{ github.run_number }} (v${{ env.KSUVER }})"
          body: |
            ## 🔧 Kernel build for **Moto G05 (lamu)** with KernelSU Next

            ### Build Configuration
            - **KernelSU Next version**: ${{ env.KSUVER }}
            - **SUSFS**: ${{ github.event.inputs.SUSFS }}
            - **Baseband Guard (BBG)**: ${{ github.event.inputs.bbg }}
            - **BBR Algorithm**: ${{ github.event.inputs.bbr }}
            - **Proxy Optimization**: ${{ github.event.inputs.proxy }}
            - **Unicode Bypass Fix**: ${{ github.event.inputs.UNICODE_BYPASS }}

            ### Device Info
            - **Device**: Moto G05 (lamu)
            - **Defconfig**: mgk_64_k66_defconfig
            - **Build variant**: user
            - **Architecture**: arm64
            - **Kernel version**: 6.6
            - **Android version**: 15

            ### Installation
            Flash the AnyKernel3 zip via custom recovery (TWRP/OrangeFox) or KernelSU manager.
          files: |
            AnyKernel3-lamu.zip
            kernel-lamu-build.zip
